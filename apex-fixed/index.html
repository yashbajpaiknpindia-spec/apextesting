    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-F3Q3MN1C5H"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-F3Q3MN1C5H', {
        send_page_view: false,          // SPA page_view fired manually in useSEO
        cookie_flags: 'SameSite=None;Secure',
        allow_google_signals: true,
        allow_ad_personalization_signals: true,
        // Enhanced measurement — scrolls, outbound links, site search
        enhanced_link_attribution: true,
      });

      // ── Global CTA / Button Click Tracker ──────────────────────────────
      // Fires ga4 'cta_click' event on any <a> or <button> with data-ga or
      // any element with class containing 'cta', 'contact', 'book', 'apply'
      document.addEventListener('click', function(e) {
        var el = e.target.closest('a, button, [data-ga]');
        if (!el) return;
        var label = el.getAttribute('data-ga')
          || el.innerText.trim().slice(0, 60)
          || el.getAttribute('aria-label')
          || 'unknown';
        var href = el.href || el.getAttribute('href') || '';
        // Always fire for nav/cta buttons
        var isCTA = el.matches('[data-ga], .cta-btn') ||
          /contact|book|apply|consult|start|work with|transform|get in touch/i.test(label);
        if (isCTA || el.tagName === 'BUTTON') {
          gtag('event', 'cta_click', {
            event_category: 'engagement',
            event_label: label,
            button_text: label,
            destination_url: href,
          });
        }
      }, true);

      // ── Scroll Depth Tracker (25/50/75/90%) ─────────────────────────────
      var scrollDepths = [25, 50, 75, 90];
      var firedDepths = {};
      window.addEventListener('scroll', function() {
        var scrolled = (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100;
        scrollDepths.forEach(function(d) {
          if (!firedDepths[d] && scrolled >= d) {
            firedDepths[d] = true;
            gtag('event', 'scroll_depth', { depth_percentage: d, page_path: window.location.pathname });
          }
        });
      }, { passive: true });

      // Reset scroll tracking on SPA route change
      window._resetScrollTracking = function() { firedDepths = {}; };
    </script>
