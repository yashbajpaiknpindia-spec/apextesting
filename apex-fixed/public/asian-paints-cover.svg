<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg0" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0B0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111111;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent0" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8562A;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#E8562A;stop-opacity:0.4" />
    </linearGradient>
    <filter id="glow0">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg0)"/>

  <!-- Subtle grid pattern -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent0)"/>

  <!-- Brand color accent top strip -->
  <rect x="0" y="0" width="1200" height="3" fill="#E8562A" opacity="0.8"/>

  <!-- Large brand initial / logo area -->
  <text x="100" y="380" font-family="Georgia, serif" font-size="260" font-weight="700"
        fill="#E8562A" opacity="0.06" letter-spacing="-10">A</text>

  <!-- Industry label -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="13" font-weight="400"
        fill="#E8562A" letter-spacing="4" opacity="0.9">FMCG / PAINT</text>
  <line x1="100" y1="185" x2="340" y2="185" stroke="#E8562A" stroke-width="1" opacity="0.4"/>

  <!-- Black Apex branding -->
  <text x="100" y="130" font-family="Arial, sans-serif" font-size="11" font-weight="400"
        fill="#C9A84C" letter-spacing="5" opacity="0.7">THE BLACK APEX CONSULTANCY</text>
  <text x="100" y="148" font-family="Arial, sans-serif" font-size="10" font-weight="300"
        fill="#ffffff" letter-spacing="3" opacity="0.3">CASE STUDY</text>

  <!-- Main brand name -->
  <text x="100" y="310" font-family="Georgia, serif" font-size="72" font-weight="700"
        fill="#FFFFFF" letter-spacing="-1">Asian Paints</text>

  <!-- Tagline lines -->
  <text x="100" y="368" font-family="Arial, sans-serif" font-size="22" font-weight="300"
        fill="#ffffff" opacity="0.5" letter-spacing="1">55% Market Share</text>
  <text x="100" y="398" font-family="Arial, sans-serif" font-size="22" font-weight="300"
        fill="#E8562A" opacity="0.75" letter-spacing="1">65 Years of Leadership</text>

  <!-- Decorative apex triangle (right side) -->
  <polygon points="950,120 1150,120 1050,320" fill="#E8562A" opacity="0.06"/>
  <polygon points="980,140 1130,140 1055,290" fill="none" stroke="#E8562A" stroke-width="1.5" opacity="0.15"/>
  <polygon points="1010,165 1100,165 1055,250" fill="none" stroke="#E8562A" stroke-width="1" opacity="0.1"/>

  <!-- Bottom gold bar -->
  <rect x="0" y="610" width="1200" height="20" fill="#C9A84C" opacity="0.08"/>
  <text x="100" y="598" font-family="Arial, sans-serif" font-size="10" font-weight="300"
        fill="#C9A84C" letter-spacing="3" opacity="0.5">theblackapexconsultancy.in</text>

  <!-- Decorative corner element -->
  <rect x="1120" y="30" width="50" height="1" fill="#E8562A" opacity="0.3"/>
  <rect x="1170" y="30" width="1" height="50" fill="#E8562A" opacity="0.3"/>
  <rect x="30" y="580" width="50" height="1" fill="#E8562A" opacity="0.3"/>
  <rect x="30" y="530" width="1" height="50" fill="#E8562A" opacity="0.3"/>
</svg>